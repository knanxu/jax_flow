defaults:
  - /task: square_lowdim
  - /network: mlp
  - /flow: mip
  - /optimization: default
  - _self_

# Random seed
seed: 42

# Logging
project_name: jax_flow
experiment_name: offline_rl_${task.name}_${flow.name}_${network.name}
log_dir: logs
checkpoint_dir: checkpoints

algorithm:
  name: offline_rl
  # BC checkpoint path (for network architecture config)
  bc_checkpoint: null
  load_bc_weights: false  # true = init encoder/flow from BC checkpoint weights (mode 2 only)

  # Encoder (RL phase only)
  freeze_encoder: true    # false = encoder updated by BC+Q loss in RL phase

  # Critic encoder
  critic_encoder_type: "none"   # "none"=用BC encoder输出(向后兼容), "same"=同BC encoder架构独立权重

  # Critic (DSRL style: large network + tanh activation)
  critic_hidden_dims: [512, 1024, 512]
  critic_activation: tanh
  critic_layer_norm: true
  num_ensembles: 2

  # Target network
  tau: 0.005
  discount: 0.99

  # Loss weights (RL phase)
  alpha: 1.0              # BC loss weight
  q_weight: 1.0           # Q loss weight
  normalize_q_loss: true  # MeanFlowQL style normalization

  # Reward
  reward_offset: -1.0     # robomimic: {0,1}->{-1,0}; Push-T dense reward: use 0.0

  # Learning rates (RL phase)
  actor_lr: 1e-4
  critic_lr: 3e-4

  # Training
  bc_warmup_steps: 0     # 0 = no warmup (mode 2), >0 = BC warmup then RL (mode 1)
  rl_steps: 500000       # RL phase training steps
  batch_size: 64
  log_interval: 1000

# Evaluation
eval:
  num_episodes: 50
  eval_interval: 10000
  render: false
  save_video: true
  num_videos: 3
  video_fps: 30

# Checkpointing
checkpoint:
  save_freq: 50000
  keep_last_n: 3

# Weights & Biases
wandb:
  enabled: true
  entity: null
  project: ${project_name}
  name: ${experiment_name}_seed${seed}
  tags:
    - ${task.name}
    - ${flow.name}
    - offline_rl
  log_videos: true
  log_video_interval: 1
