defaults:
  - /task: square_lowdim
  - _self_

algorithm:
  bc_checkpoint: null  # Required: path to trained BC checkpoint

  # Speed options: range [1.0, max_speed] with given granularity
  max_speed: 4.0
  speed_granularity: 0.1  # produces [1.0, 1.1, 1.2, ..., 4.0]

  # Frame skip: speed policy called every k_skip env steps
  k_skip: 4

  # Reward: r_ST = alpha * v^beta + r_task
  alpha: 0.1
  beta: 2.0

  # Rainbow DQN
  lr: 3e-4
  hidden_dims: [512, 512]
  num_atoms: 51
  v_min: -10.0
  v_max: 10.0
  discount: 0.99
  tau: 0.005
  activation: relu
  layer_norm: true

  # PER
  per_alpha: 0.6
  per_beta_start: 0.4
  per_beta_end: 1.0
  buffer_capacity: 100000

  # Exploration (epsilon-greedy linear decay)
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay_steps: 50000

  # Training
  batch_size: 256
  total_episodes: 5000
  learning_starts: 1000  # min transitions before training
  train_freq: 4  # train every N env steps
  grad_clip_norm: 10.0
  freeze_encoder: true

  # Logging
  log_interval: 100  # log every N episodes

eval:
  eval_interval: 200  # eval every N episodes
  num_episodes: 20
  save_video: true
  num_videos: 3

checkpoint:
  save_freq: 500  # save every N episodes
  keep_last_n: 3

wandb:
  enabled: false
  project: jax_flow
  entity: null

seed: 0
checkpoint_dir: checkpoints
