# ACFQL default configuration
# Usage: python scripts/train_acfql.py --config-name acfql_default task=square_lowdim

defaults:
  - /task: square_lowdim
  - /network: mlp
  - /flow: flow_matching
  - /optimization: default
  - _self_

# Random seed
seed: 42

# Logging
project_name: jax_flow
experiment_name: acfql_${task.name}_${flow.name}_${network.name}
log_dir: logs
checkpoint_dir: checkpoints

# ============================================================
# ACFQL Algorithm Parameters
# ============================================================
algorithm:
  name: acfql

  # Action chunking
  chunk_length: 5          # Number of actions in each chunk (H)

  # Actor type: "best-of-n" or "distill-ddpg"
  actor_type: best-of-n
  actor_num_samples: 32    # Number of candidates for best-of-N

  # Critic
  num_qs: 2                # Q-function ensemble size
  q_agg: mean              # Target Q aggregation: "min" or "mean" (qc default: mean)
  value_hidden_dims: [512, 512, 512, 512]
  critic_layer_norm: true

  # Target network
  tau: 0.005               # Polyak averaging coefficient
  discount: 0.99           # Discount factor (raised to chunk_length for TD target)

  # Distillation (only for distill-ddpg mode)
  alpha: 100.0             # Distillation loss coefficient

  # Reward
  reward_transform: true   # Apply reward - 1.0 for robomimic

  # Training phases
  offline_steps: 500000    # Number of offline pretraining steps
  online_steps: 500000     # Number of online fine-tuning steps
  utd_ratio: 1             # Update-to-data ratio for online phase

  # Replay buffer
  buffer_capacity: 1000000

  # Exploration (online phase)
  random_steps: 5000       # Random exploration steps before policy

# Evaluation
eval:
  num_episodes: 50
  eval_interval: 10000
  render: false
  save_video: true
  num_videos: 3
  max_episode_steps: 500

# Checkpointing
checkpoint:
  save_freq: 50000
  keep_last_n: 3
  save_best: true

# Weights & Biases
wandb:
  enabled: true
  entity: null
  project: ${project_name}
  name: ${experiment_name}_seed${seed}
  tags:
    - acfql
    - ${task.name}
    - ${flow.name}
  log_videos: true
