# PickPlace task with low-dimensional state observations

name: pick_place_lowdim
env_name: PickPlace
dataset_name: pick_place
obs_type: lowdim

# Dataset configuration
dataset:
  path: data/mimicgen/pick_place/ph/low_dim_v141.hdf5
  dataset_type: ph
  horizon: 16
  obs_steps: 2
  act_steps: 8

  # Normalization
  normalize_obs: true
  normalize_act: true
  norm_type: min_max

# Environment configuration
env:
  max_episode_steps: 400

# Observation and action dimensions
obs_dim: 65            # robot0_eef_pos(3) + robot0_eef_quat(4) + robot0_gripper_qpos(2) + object(56)
act_dim: 10
abs_action: true

# Observation keys to use
obs_keys:
  - robot0_eef_pos
  - robot0_eef_quat
  - robot0_gripper_qpos
  - object
