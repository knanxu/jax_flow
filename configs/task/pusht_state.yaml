# Push-T task with state observations (5D)

name: pusht_state
env_name: PushT
dataset_name: pusht
obs_type: state
task_source: pusht

# Dataset configuration
dataset:
  path: pusht/pusht_cchi_v7_replay.zarr
  dataset_repo: ChaoyiPan/mip-dataset
  dataset_filename: pusht/pusht_cchi_v7_replay.zarr.zip
  horizon: 16
  obs_steps: 2
  act_steps: 8
  normalize_obs: true
  normalize_act: true
  norm_type: min_max

# Environment configuration
env:
  max_episode_steps: 300

# Observation and action dimensions
obs_dim: 5
act_dim: 2

# Task-specific optimization overrides
optimization:
  batch_size: 1024
