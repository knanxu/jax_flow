# Coffee task with low-dimensional state observations

name: coffee_lowdim
env_name: Coffee
dataset_name: coffee
obs_type: lowdim

# Dataset configuration
dataset:
  path: data/mimicgen/coffee/ph/low_dim_v141.hdf5
  dataset_type: ph
  horizon: 16
  obs_steps: 2
  act_steps: 8

  # Normalization
  normalize_obs: true
  normalize_act: true
  norm_type: min_max

# Environment configuration
env:
  max_episode_steps: 400

# Observation and action dimensions
obs_dim: 39
act_dim: 7

# Observation keys to use
obs_keys:
  - robot0_eef_pos
  - robot0_eef_quat
  - robot0_gripper_qpos
  - object
