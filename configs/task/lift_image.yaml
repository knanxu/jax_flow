# Lift task with image observations

name: lift_image
env_name: Lift
dataset_name: lift  # Dataset name for download
obs_type: image

# Dataset configuration
dataset:
  path: data/robomimic/lift/ph/image_v141.hdf5
  dataset_type: ph     # ph (proficient-human), mh (multi-human), mg (machine-generated)
  horizon: 16
  obs_steps: 2
  act_steps: 8
  image_keys: [agentview_image, robot0_eye_in_hand_image]
  lowdim_keys: [robot0_eef_pos, robot0_eef_quat, robot0_gripper_qpos]
  image_size: [84, 84]
  crop_shape: [76, 76]
  pad_before: 1
  pad_after: 7

  # Data loading
  num_workers: 4
  prefetch_factor: 2

# Environment configuration
env:
  num_envs: 10
  max_episode_steps: 400
  reward_shaping: false

  # Robomimic specific
  robots: Panda
  controller: OSC_POSE
  gripper_type: default
  has_renderer: false
  has_offscreen_renderer: true
  use_camera_obs: true
  control_freq: 20

# Action dimension
act_dim: 10
abs_action: true

# Task-specific parameters
task_horizon: 400
success_threshold: 0.9
