# DexMimicGen TwoArmThreading task with low-dimensional state observations

name: dex_threading_lowdim
env_name: TwoArmThreading
dataset_name: two_arm_threading
obs_type: lowdim

# Dataset configuration
dataset:
  path: data/dexmimicgen/two_arm_threading/ph/low_dim_v141.hdf5
  dataset_type: ph
  horizon: 16
  obs_steps: 2
  act_steps: 8

  # Normalization
  normalize_obs: true
  normalize_act: true
  norm_type: min_max

# Environment configuration
env:
  max_episode_steps: 400

# Observation and action dimensions
obs_dim: 18            # robot0_eef_pos(3) + robot0_eef_quat(4) + robot0_gripper_qpos(2) + robot1_eef_pos(3) + robot1_eef_quat(4) + robot1_gripper_qpos(2)
act_dim: 20
abs_action: true

# Observation keys (dual-arm, no object state)
obs_keys:
  - robot0_eef_pos
  - robot0_eef_quat
  - robot0_gripper_qpos
  - robot1_eef_pos
  - robot1_eef_quat
  - robot1_gripper_qpos

# Task-specific optimization overrides
optimization:
  batch_size: 1024
