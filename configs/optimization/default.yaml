# Default optimization configuration

# Learning rate
lr: 1e-4
weight_decay: 1e-5

# Optimizer
optimizer: adamw
optimizer_kwargs:
  b1: 0.9
  b2: 0.999
  eps: 1e-8

# Learning rate schedule
lr_schedule:
  type: cosine  # constant, linear, cosine, exponential
  warmup_steps: 1000
  total_steps: 300000
  min_lr: 1e-6

# Training parameters
batch_size: 256
gradient_steps: 300000
grad_clip_norm: 10.0

# EMA (Exponential Moving Average)
use_ema: true
ema_decay: 0.995

# Evaluation and logging
eval_freq: 5000      # Evaluate every N steps
save_freq: 10000     # Save checkpoint every N steps
log_freq: 100        # Log metrics every N steps

# Data loading
num_workers: 4
prefetch_factor: 2
pin_memory: true
