# Default optimization configuration (image tasks)
# For lowdim tasks, override: optimization.batch_size=256

# Learning rate
lr: 1e-4
weight_decay: 1e-6

# Optimizer (betas match Diffusion Policy)
optimizer: adamw
optimizer_kwargs:
  b1: 0.95
  b2: 0.999
  eps: 1e-8

# Learning rate schedule
lr_schedule:
  type: cosine
  warmup_steps: 500
  total_steps: 300000
  min_lr: 0.0

# Training parameters
batch_size: 64
gradient_steps: 300000
grad_clip_norm: 10.0

# EMA (Exponential Moving Average) — progressive decay matching Diffusion Policy
# decay = clamp(1 - (1 + step/inv_gamma)^(-power), min_value, max_value)
use_ema: true
ema_type: progressive
ema_inv_gamma: 1.0
ema_power: 0.75
ema_min_value: 0.0
ema_max_value: 0.9999

# Evaluation and logging
eval_freq: 5000
save_freq: 10000
log_freq: 100

# Data loading
num_workers: 4
prefetch_factor: 2
pin_memory: true
