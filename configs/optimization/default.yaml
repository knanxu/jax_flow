# Default optimization configuration

# Learning rate
lr: 1e-4
weight_decay: 1e-6

# Optimizer (betas match Diffusion Policy)
optimizer: adamw
optimizer_kwargs:
  b1: 0.95
  b2: 0.999
  eps: 1e-8

# Learning rate schedule
lr_schedule:
  type: cosine
  warmup_steps: 0
  total_steps: 300000
  min_lr: 0.0

# Training parameters
batch_size: 1024
gradient_steps: 300000
grad_clip_norm: 10.0

# EMA (Exponential Moving Average)
use_ema: true
ema_decay: 0.995

# Evaluation and logging
eval_freq: 5000
save_freq: 10000
log_freq: 100

# Data loading
num_workers: 4
prefetch_factor: 2
pin_memory: true
