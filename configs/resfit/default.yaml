# ResFiT default algorithm configuration

algorithm:
  name: resfit

  # === Training phases ===
  total_timesteps: 300000
  learning_starts: 10000        # Phase 1: random exploration steps
  critic_warmup_steps: 10000    # Phase 2: critic-only warmup gradient steps

  # === Optimizer ===
  actor_lr: 1.0e-6
  critic_lr: 1.0e-4
  weight_decay: 0.0

  # === Residual action ===
  action_scale: 0.1
  progressive_clipping_steps: 0

  # === Exploration noise ===
  stddev_max: 0.05
  stddev_min: 0.05
  stddev_steps: 300000
  stddev_clip: 0.3
  random_action_noise_scale: 0.2

  # === Replay buffer ===
  buffer_size: 200000
  batch_size: 256
  online_batch_size: 128
  offline_batch_size: 128
  n_step: 3
  gamma: 0.99

  # === Update frequency ===
  utd_ratio: 4
  actor_update_cadence: 4

  # === Target networks ===
  tau: 0.005

  # === Critic ===
  num_q: 10
  min_q_heads: 2
  critic_hidden_dim: 1024
  critic_num_layers: 2
  critic_layer_norm: true
  spatial_emb_dim: 1024
  grad_clip_norm: 1.0

  # === Actor ===
  actor_hidden_dim: 1024
  actor_num_layers: 2
  actor_layer_norm: true

  # === Encoder ===
  init_encoder_from_bc: false
  aug_type: random_shifts
  aug_pad: 4

  # === Evaluation ===
  eval_interval: 10000
  eval_episodes: 50
  eval_max_steps: 500

  # === Checkpoint ===
  checkpoint_interval: 50000
  keep_last_n: 3

  # === Logging ===
  log_interval: 1000

# BC checkpoint path (must be specified)
bc_checkpoint: ???
